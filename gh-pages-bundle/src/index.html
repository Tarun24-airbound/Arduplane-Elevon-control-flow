<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ArduPlane Control Flow — Intent → PWM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  :root {
    --bg: #060a0f;
    --bg-2: #0a0e14;
    --bg-3: #0f141c;
    --panel: #0c1219;
    --panel-2: #131a23;
    --border: #1b2532;
    --border-2: #25323f;
    --ink: #c9d4dd;
    --ink-dim: #7a8a99;
    --ink-faint: #4a5563;
    --accent: #5eead4;
    --accent-2: #2dd4bf;
    --accent-glow: rgba(94, 234, 212, 0.22);
    --warn: #f59e0b;
    --hot: #f97316;
    --cool: #38bdf8;
    --mag: #c084fc;
    --grid: rgba(94, 234, 212, 0.04);
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: 'Space Grotesk', system-ui, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  body {
    background:
      radial-gradient(ellipse 90% 60% at 50% -10%, rgba(94, 234, 212, 0.06), transparent 60%),
      linear-gradient(180deg, #060a0f 0%, #04070b 100%);
    background-attachment: fixed;
  }

  /* subtle blueprint grid */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
    mask-image: radial-gradient(ellipse 100% 80% at 50% 50%, black 30%, transparent 95%);
  }

  #root { position: relative; z-index: 1; }

  ::selection { background: var(--accent); color: #061015; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 6px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-faint); }
</style>
</head>
<body>
  <div id="root"></div>

  <script>
    window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "density": "comfortable",
      "animateFlow": true
    }/*EDITMODE-END*/;
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="stages.jsx"></script>
  <script type="text/babel" src="examples.jsx"></script>
  <script type="text/babel" src="mini-calculator.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
